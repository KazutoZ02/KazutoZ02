<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Design, code, ship</title>
  <desc id="desc">A dark indigo developer profile banner with an abstract orbital grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="0.55" stop-color="#11112a"/>
      <stop offset="1" stop-color="#17103a"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="46%" r="52%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity=".30"/>
      <stop offset=".45" stop-color="#6366f1" stop-opacity=".10"/>
      <stop offset="1" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#c4b5fd" stroke-opacity=".07"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <clipPath id="frame"><rect width="1280" height="360" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1280" height="360" fill="url(#bg)"/>
    <rect width="1280" height="360" fill="url(#grid)"/>
    <rect width="1280" height="360" fill="url(#glow)"/>
    <circle cx="1018" cy="178" r="158" fill="none" stroke="#a78bfa" stroke-opacity=".16"/>
    <circle cx="1018" cy="178" r="108" fill="none" stroke="#67e8f9" stroke-opacity=".18"/>
    <ellipse cx="1018" cy="178" rx="230" ry="74" transform="rotate(-18 1018 178)" fill="none" stroke="url(#accent)" stroke-opacity=".42" stroke-width="2"/>
    <ellipse cx="1018" cy="178" rx="187" ry="53" transform="rotate(31 1018 178)" fill="none" stroke="#a78bfa" stroke-opacity=".22"/>
    <circle cx="835" cy="106" r="7" fill="#67e8f9"/>
    <circle cx="1137" cy="267" r="5" fill="#a78bfa"/>
    <circle cx="1018" cy="178" r="28" fill="#8b5cf6" fill-opacity=".30" filter="url(#blur)"/>
    <circle cx="1018" cy="178" r="8" fill="#f4f4f5"/>
    <path d="M80 86h44" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <text x="80" y="153" fill="#fafafa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="700" letter-spacing="-1">DESIGN · CODE · SHIP</text>
    <text x="82" y="205" fill="#a1a1aa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" letter-spacing="3">BUILDING USEFUL THINGS WITH CARE</text>
    <g transform="translate(80 252)" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="13">
      <rect width="258" height="32" rx="16" fill="#ffffff" fill-opacity=".06" stroke="#ffffff" stroke-opacity=".10"/>
      <circle cx="18" cy="16" r="4" fill="#67e8f9"/>
      <text x="32" y="21" fill="#d4d4d8">idea → iteration → impact</text>
    </g>
  </g>
  <rect x=".5" y=".5" width="1279" height="359" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity=".10"/>
</svg>
