<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Design, code, ship</title>
  <desc id="desc">A light indigo developer profile banner with an abstract orbital grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fafafa"/>
      <stop offset=".55" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <radialGradient id="glow" cx="76%" cy="46%" r="52%">
      <stop stop-color="#8b5cf6" stop-opacity=".18"/>
      <stop offset=".5" stop-color="#06b6d4" stop-opacity=".07"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#4f46e5" stroke-opacity=".07"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <clipPath id="frame"><rect width="1280" height="360" rx="24"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1280" height="360" fill="url(#bg)"/>
    <rect width="1280" height="360" fill="url(#grid)"/>
    <rect width="1280" height="360" fill="url(#glow)"/>
    <circle cx="1018" cy="178" r="158" fill="none" stroke="#7c3aed" stroke-opacity=".14"/>
    <circle cx="1018" cy="178" r="108" fill="none" stroke="#0891b2" stroke-opacity=".16"/>
    <ellipse cx="1018" cy="178" rx="230" ry="74" transform="rotate(-18 1018 178)" fill="none" stroke="url(#accent)" stroke-opacity=".38" stroke-width="2"/>
    <ellipse cx="1018" cy="178" rx="187" ry="53" transform="rotate(31 1018 178)" fill="none" stroke="#7c3aed" stroke-opacity=".20"/>
    <circle cx="835" cy="106" r="7" fill="#0891b2"/>
    <circle cx="1137" cy="267" r="5" fill="#7c3aed"/>
    <circle cx="1018" cy="178" r="28" fill="#8b5cf6" fill-opacity=".24" filter="url(#blur)"/>
    <circle cx="1018" cy="178" r="8" fill="#18181b"/>
    <path d="M80 86h44" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
    <text x="80" y="153" fill="#18181b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="700" letter-spacing="-1">DESIGN · CODE · SHIP</text>
    <text x="82" y="205" fill="#52525b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" letter-spacing="3">BUILDING USEFUL THINGS WITH CARE</text>
    <g transform="translate(80 252)" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="13">
      <rect width="258" height="32" rx="16" fill="#18181b" fill-opacity=".04" stroke="#18181b" stroke-opacity=".10"/>
      <circle cx="18" cy="16" r="4" fill="#0891b2"/>
      <text x="32" y="21" fill="#3f3f46">idea → iteration → impact</text>
    </g>
  </g>
  <rect x=".5" y=".5" width="1279" height="359" rx="23.5" fill="none" stroke="#18181b" stroke-opacity=".10"/>
</svg>
